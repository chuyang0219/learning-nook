<!-- ═══════════════════════════════════════════════════════════════════
     LIBRARY COMPONENTS  (visual layout — edit with care)
     ═══════════════════════════════════════════════════════════════════ -->
<script type="text/babel">
// Learning Nook — realistic responsive library
// Books arranged on a textured oak shelf, auto-chunked into drawers of 6.
// Each drawer has its own brass handle; clicking it brings that drawer's
// books forward as face-out covers (3 across, 2 rows). Only one drawer
// open at a time. Click outside the covers to dismiss.
// Desktop: 3 drawers across in one row. Mobile: drawers stacked vertically.

function chunk(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}

function Library() {
  const drawers = React.useMemo(() => {
    const groups = chunk(window.BOOKS, window.BOOKS_PER_DRAWER);
    return groups.map((books, i) => ({
      id: `drawer-${i + 1}`,
      books,
    }));
  }, []);

  const [openId, setOpenId] = React.useState(null);
  const [hovered, setHovered] = React.useState(null); // {drawer, idx}

  React.useEffect(() => {
    if (document.getElementById('rn-anim-styles')) return;
    const s = document.createElement('style');
    s.id = 'rn-anim-styles';
    s.textContent = `
      .rn-spines { transform-origin: bottom center; transition: transform .4s ease, opacity .35s ease, filter .35s ease; }
      .rn-spines.rn-shown { opacity: 1; transform: translateY(0) scale(1); filter: none; pointer-events: auto; visibility: visible; }
      .rn-spines.rn-hidden { opacity: .35; transform: translateY(20px) scale(.92); filter: brightness(.65); pointer-events: none; }
      .rn-rail { transition: opacity .35s ease, transform .4s ease; }
      .rn-rail.rn-shown { opacity: 1; transform: translateY(0); pointer-events: auto; }
      .rn-rail.rn-hidden { opacity: 0; transform: translateY(40px); pointer-events: none; }

      /* Drawer grid — 3 across on desktop, stacked on mobile */
      .rn-drawer-stack {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
      }
      .rn-drawer-section + .rn-drawer-section .rn-drawer-divider {
        display: block;
      }

      /* Tablet — keep 3 across but tighter */
      @media (max-width: 900px) {
        .rn-drawer-stack { grid-template-columns: 1fr; }
        .rn-drawer-divider { display: none !important; }
      }

      /* Mobile */
      @media (max-width: 640px) {
        .rn-scene { padding: 32px 14px 28px !important; }
        .rn-h1 { font-size: 40px !important; }
        .rn-kicker { font-size: 10px !important; letter-spacing: .35em !important; }
        .rn-shelf-wrap { max-width: 100% !important; }
        .rn-shelf-inner { padding: 16px 10px 0 !important; height: 250px !important; }
        .rn-spine-row { gap: 3px !important; }
        .rn-rail-row {
          grid-template-columns: repeat(3, minmax(0, 76px)) !important;
          gap: 8px 10px !important; padding: 10px 10px 8px !important;
        }
        .rn-rail-row .rn-cover { max-width: 76px !important; height: 114px !important; }
        .rn-drawer-front-face { height: 44px !important; }
        .rn-brass-pull { width: 104px !important; height: 30px !important; }
        .rn-footer { font-size: 12px !important; }
      }
    `;
    document.head.appendChild(s);
  }, []);

  return (
    <div style={S.scene} className="rn-scene">
      <div style={S.windowGlow} />
      <div style={S.dust} />

      <header style={S.header}>
        <p style={S.kicker} className="rn-kicker">· The Learning Nook ·</p>
        <h1 style={S.h1} className="rn-h1">Library</h1>
        <div style={S.divider}>
          <span style={S.divLine} />
          <span style={S.divDot}>✦</span>
          <span style={S.divLine} />
        </div>
      </header>

      <main style={S.shelfWrap} className="rn-shelf-wrap">
        <div
          style={S.shelfBox}
          onClick={(e) => { if (openId) setOpenId(null); }}
        >
          <div style={S.woodGrain} />
          <div style={S.woodKnots} />
          <div style={S.molding} />

          <div style={S.drawerStack} className="rn-drawer-stack">
            {drawers.map((d, di) => {
              const isOpen = openId === d.id;
              return (
                <Drawer
                  key={d.id}
                  drawer={d}
                  drawerIdx={di}
                  isOpen={isOpen}
                  anyOpen={openId !== null}
                  onToggle={() => setOpenId(p => p === d.id ? null : d.id)}
                  hovered={hovered}
                  setHovered={setHovered}
                />
              );
            })}
          </div>
        </div>
      </main>

      <footer style={S.footer} className="rn-footer">
        <span style={S.footMark}>❦</span>
        <span>{openId ? "Pull a volume to read it." : "Pull a brass handle to bring books forward."}</span>
        <span style={S.footMark}>❦</span>
      </footer>
    </div>
  );
}

function Drawer({ drawer: d, drawerIdx, isOpen, anyOpen, onToggle, hovered, setHovered }) {
  const books = d.books;

  return (
    <section style={S.drawerSection} className="rn-drawer-section">
      <span style={S.drawerDivider} className="rn-drawer-divider" />
      <div style={S.shelfInner} className="rn-shelf-inner">
        <div
          className={(isOpen ? 'rn-spines rn-hidden' : 'rn-spines rn-shown') + ' rn-spine-row'}
          style={S.spineRow}
        >
          {books.map((b, i) => (
            <Spine
              key={b.title}
              book={b}
              hovered={hovered?.drawer === d.id && hovered?.idx === i}
              onHover={(on) => setHovered(on ? { drawer: d.id, idx: i } : null)}
            />
          ))}
        </div>

        <div
          className={(isOpen ? 'rn-rail rn-shown' : 'rn-rail rn-hidden') + ' rn-rail-row'}
          style={S.displayRail}
        >
          {books.map((b, i) => (
            <Cover
              key={b.title}
              book={b}
              hovered={hovered?.drawer === d.id && hovered?.idx === i}
              onHover={(on) => setHovered(on ? { drawer: d.id, idx: i } : null)}
            />
          ))}
        </div>
      </div>

      <div style={S.drawerFront}>
        <div style={S.drawerFrontTop} />
        <div style={S.drawerFrontFace} className="rn-drawer-front-face">
          <button
            type="button"
            onClick={(e) => { e.stopPropagation(); onToggle(); }}
            disabled={anyOpen && !isOpen}
            style={{
              ...S.brassPull,
              opacity: anyOpen && !isOpen ? 0.5 : 1,
              cursor: anyOpen && !isOpen ? 'not-allowed' : 'pointer',
            }}
            className="rn-brass-pull"
            aria-label={isOpen ? 'Close drawer' : 'Open drawer'}
            title={isOpen ? 'Close — return books to shelf' : 'Open — bring books forward'}
          >
            <span style={S.brassPlate} />
            <span style={{ ...S.brassScrew, left: 6 }} />
            <span style={{ ...S.brassScrew, right: 6 }} />
            <span style={S.brassBail} />
            <span style={S.brassBailShadow} />
          </button>
        </div>
        <div style={S.drawerFrontBottom} />
      </div>
    </section>
  );
}

function Spine({ book: b, hovered, onHover }) {
  const h = 260 * b.height; // shortened from 320 so books fit narrower drawers
  const ageTint = b.age === 'weathered' ? 'sepia(.15) brightness(.95)'
                : b.age === 'faded' ? 'saturate(.75) brightness(1.05)'
                : 'none';
  const muted = b.comingSoon ? ' saturate(.55) brightness(.92)' : '';

  const titleSize = spineTitleSize(b.title, b.thickness, h);
  const zoneH = h * 0.50;
  const wrapTitle = b.title.length * titleSize * 0.50 > zoneH;
  const authorSize = b.thickness >= 42 ? 11 : 9.5;

  const handleClick = (e) => {
    e.stopPropagation();
    if (b.comingSoon) { e.preventDefault(); }
  };

  return (
    <a
      href={b.comingSoon ? '#' : b.href}
      onClick={handleClick}
      onMouseEnter={() => onHover(true)}
      onMouseLeave={() => onHover(false)}
      style={{
        ...S.spine,
        width: b.thickness,
        height: h,
        transform: hovered ? 'translateY(-12px)' : 'translateY(0)',
        boxShadow: hovered
          ? `0 18px 26px -10px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,230,180,.15)`
          : `0 6px 12px -6px rgba(0,0,0,.35), inset -1px 0 2px rgba(0,0,0,.35), inset 1px 0 1px rgba(255,255,255,.04)`,
        zIndex: hovered ? 10 : 1,
        filter: ageTint + muted,
        cursor: b.comingSoon ? 'default' : 'pointer',
      }}
      title={`${b.title} — ${b.author}${b.comingSoon ? ' (coming soon)' : ''}`}
    >
      <span style={{
        ...S.spineBase,
        background: `linear-gradient(90deg,
          ${b.accent} 0%,
          ${b.cloth} 12%,
          ${shade(b.cloth, 0.08)} 50%,
          ${b.cloth} 88%,
          ${b.accent} 100%)`,
      }} />

      {b.style === 'leather' && (
        <>
          <span style={{ ...S.layer, opacity: 0.18, mixBlendMode: 'overlay',
            backgroundImage: 'radial-gradient(circle at 30% 20%, rgba(255,255,255,.4) 0%, transparent 35%), radial-gradient(circle at 70% 70%, rgba(0,0,0,.3) 0%, transparent 40%)' }} />
          <span style={{ ...S.layer, opacity: 0.25,
            backgroundImage: 'repeating-linear-gradient(72deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px), repeating-linear-gradient(118deg, rgba(255,255,255,.05) 0 1px, transparent 1px 4px)' }} />
        </>
      )}
      {b.style === 'cloth' && (
        <span style={{ ...S.layer, opacity: 0.22,
          backgroundImage: 'repeating-linear-gradient(0deg, rgba(0,0,0,.25) 0 1px, transparent 1px 2px), repeating-linear-gradient(90deg, rgba(0,0,0,.18) 0 1px, transparent 1px 2px)' }} />
      )}
      {b.style === 'paper' && (
        <span style={{ ...S.layer, opacity: 0.18,
          backgroundImage: 'repeating-linear-gradient(0deg, rgba(0,0,0,.12) 0 1px, transparent 1px 4px)' }} />
      )}

      <span style={{ position: 'absolute', left: 0, right: 0, bottom: 0,
        height: 16 + b.wear * 20,
        background: `linear-gradient(0deg, rgba(0,0,0,${0.35 * b.wear}) 0%, transparent 100%)`,
        pointerEvents: 'none' }} />
      <span style={{ position: 'absolute', left: 0, right: 0, top: 0,
        height: 12 + b.wear * 14,
        background: `linear-gradient(180deg, rgba(0,0,0,${0.25 * b.wear}) 0%, transparent 100%)`,
        pointerEvents: 'none' }} />
      {b.wear > 0.5 && (
        <span style={{ position: 'absolute', top: '8%', bottom: '8%',
          left: b.style === 'leather' ? 4 : 3, width: 1,
          background: `rgba(0,0,0,${0.3 * b.wear})`, pointerEvents: 'none' }} />
      )}

      {b.style === 'leather' && (
        <>
          <span style={{ ...S.hub, top: '26%' }} />
          <span style={{ ...S.hub, top: '50%' }} />
          <span style={{ ...S.hub, top: '74%' }} />
        </>
      )}

      <span style={{ position: 'absolute', left: 5, right: 5, top: '14%', height: 1, background: `${b.foil}99`, pointerEvents: 'none', boxShadow: `0 1px 0 ${b.accent}77` }} />
      <span style={{ position: 'absolute', left: 5, right: 5, top: '62%', height: 1, background: `${b.foil}99`, pointerEvents: 'none', boxShadow: `0 1px 0 ${b.accent}77` }} />

      <span style={S.spineTitleRot}>
        <span style={{
          ...S.spineTitleRotInner,
          color: b.foil,
          fontSize: titleSize,
          letterSpacing: b.title.length > 14 ? '.03em' : '.06em',
          textShadow: hovered ? `0 1px 0 ${b.accent}, 0 0 8px ${b.foil}aa` : `0 1px 0 ${b.accent}`,
          ...(wrapTitle ? { whiteSpace: 'normal', width: Math.round(zoneH * 0.92), lineHeight: 1.2 } : {}),
        }}>
          {b.title}
        </span>
      </span>

      <span style={S.spineAuthor}>
        <span style={{
          ...S.spineAuthorInner,
          color: `${b.foil}dd`,
          fontSize: authorSize,
          textShadow: `0 1px 0 ${b.accent}`,
        }}>
          {b.authorLast}
        </span>
      </span>

      <span style={{
        position: 'absolute', bottom: 6, left: 0, right: 0,
        textAlign: 'center', fontFamily: '"Cormorant Garamond", serif',
        fontSize: 7.5, color: `${b.foil}88`, letterSpacing: '.15em',
        pointerEvents: 'none',
      }}>{b.year}</span>
    </a>
  );
}

function Cover({ book: b, hovered, onHover }) {
  const handleClick = (e) => {
    e.stopPropagation();
    if (b.comingSoon) { e.preventDefault(); }
  };

  return (
    <a
      href={b.comingSoon ? '#' : b.href}
      onClick={handleClick}
      onMouseEnter={() => onHover(true)}
      onMouseLeave={() => onHover(false)}
      style={{
        ...S.cover,
        background: `linear-gradient(135deg, ${b.cloth} 0%, ${b.accent} 100%)`,
        transform: hovered ? 'translateY(-8px) scale(1.06)' : 'translateY(0) scale(1)',
        boxShadow: hovered
          ? `0 18px 26px -10px rgba(0,0,0,.55), 0 0 0 2px ${b.foil}66, inset 0 0 0 1px rgba(255,220,150,.22)`
          : `0 8px 14px -6px rgba(0,0,0,.45), inset 0 0 0 1px rgba(0,0,0,.35)`,
        filter: b.comingSoon ? 'saturate(.6) brightness(.92)' : 'none',
        cursor: b.comingSoon ? 'default' : 'pointer',
      }}
      className="rn-cover"
      title={`${b.title} — ${b.author}${b.comingSoon ? ' (coming soon)' : ''}`}
    >
      <span style={{ ...S.frameOuter, borderColor: `${b.foil}55` }} />
      <span style={{ ...S.frameInner, borderColor: `${b.foil}aa` }} />
      <span style={S.coverInner}>
        <span style={{ ...S.coverOrn, color: b.foil }}>❦</span>
        <span style={{ ...S.coverTitle, color: b.foil, textShadow: `0 1px 0 ${b.accent}` }}>{b.title}</span>
        <span style={{ ...S.coverRule, background: `${b.foil}99` }} />
        <span style={{ ...S.coverAuthor, color: `${b.foil}dd` }}>{b.authorLast}</span>
        <span style={{ ...S.coverYear, color: `${b.foil}99` }}>
          {b.comingSoon ? '— soon —' : b.year}
        </span>
      </span>
    </a>
  );
}

function spineTitleSize(title, thickness, height) {
  const len = title.length;
  const avail = height - 80;
  const charsFit = avail / 7.5;
  if (len <= charsFit / 1.5) return 14;
  if (len <= charsFit / 1.3) return 12.5;
  if (len <= charsFit / 1.1) return 11.5;
  if (len <= charsFit * 1.2) return 10.5;
  if (len <= charsFit * 2.2) return 9.5;
  return 8.5;
}

function shade(hex, amt) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substr(0, 2), 16);
  const g = parseInt(h.substr(2, 2), 16);
  const b = parseInt(h.substr(4, 2), 16);
  const adj = (c) => Math.max(0, Math.min(255, Math.round(c + (amt > 0 ? (255 - c) * amt : c * amt))));
  return `rgb(${adj(r)}, ${adj(g)}, ${adj(b)})`;
}
